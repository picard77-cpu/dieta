<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dieta</title>
<style>
  :root {
    --bg: #f4f0e8; --surface: #ede8de; --surface2: #e5dfd3; --border: #d5cfc3;
    --text: #2a2a24; --text-muted: #5a5a50; --text-dim: #9a9a8a; --check: #5a7a5a;
    --r: 12px; --rs: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; padding-bottom: 40px; }

  .hdr { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 16px 10px; }
  .hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .reset-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-family: inherit; }
  .day-sel { display: flex; gap: 6px; }
  .day-btn { flex: 1; padding: 7px 4px; border-radius: var(--rs); border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 11px; font-weight: 600; font-family: inherit; cursor: pointer; text-align: center; }
  .day-btn.on  { background: rgba(90,122,90,.15); border-color: #5a7a5a; color: #3d5c3d; }
  .day-btn.off { background: rgba(74,122,181,.15); border-color: #4a7ab5; color: #2d5a8a; }
  .day-btn.sc  { background: rgba(196,122,58,.15); border-color: #c47a3a; color: #8a4a1a; }

  /* TOTALI GIORNALIERI */
  .totali { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .totali-row { display: flex; gap: 6px; }
  .tot-card { flex: 1; background: var(--surface); border-radius: var(--rs); padding: 8px 4px; text-align: center; }
  .tot-val { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .tot-val.over { color: #b5502d; }
  .tot-lbl { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }
  .tot-target { font-size: 9px; color: var(--text-dim); margin-top: 1px; }

  .prog-wrap { display: flex; align-items: center; gap: 10px; padding: 8px 16px 0; }
  .prog-bar { flex: 1; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: #5a7a5a; border-radius: 3px; transition: width .3s; }
  .prog-lbl { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  .content { padding: 0 16px; }
  .meal-sec { margin-top: 18px; }
  .meal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .meal-lbl { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; padding: 5px 11px; border-radius: 20px; display: inline-block; }
  .meal-lbl.colazione,.meal-lbl.pranzo,.meal-lbl.cena { background: rgba(90,122,90,.12); color: #3d5c3d; }
  .meal-lbl.spuntino,.meal-lbl.merenda { background: rgba(74,122,181,.12); color: #2d5a8a; }
  .meal-lbl.serale { background: rgba(196,122,58,.12); color: #8a4a1a; }
  .meal-sub { font-size: 10px; color: var(--text-dim); font-weight: 600; text-align: right; }
  .meal-sub b { color: var(--text-muted); }
  .sec-note { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-style: italic; }
  .divider { height: 1px; background: var(--border); margin: 18px 0 2px; }

  .alt-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .alt-tab { font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer; font-family: inherit; }
  .alt-tab.sel { border-color: #7a9a7a; background: rgba(90,122,90,.12); color: #3d5c3d; }

  .cat-block { margin-bottom: 12px; }
  .cat-lbl { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; padding-left: 2px; }

  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; margin-bottom: 4px; border-radius: var(--rs); border: 1px solid var(--border); background: var(--surface); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .opt.ck { background: rgba(90,122,90,.14); border-color: #9ab89a; }
  .opt-circle { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--text-dim); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .opt.ck .opt-circle { background: var(--check); border-color: var(--check); }
  .opt.ck .opt-circle::after { content: ''; width: 5px; height: 9px; border: 2px solid #f4f0e8; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }
  .opt-text { font-size: 14px; color: var(--text-muted); flex: 1; line-height: 1.4; }
  .opt.ck .opt-text { color: var(--text); }
  .opt-macros { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  .sub-list { margin-top: 6px; margin-left: 4px; display: flex; flex-direction: column; gap: 3px; }
  .sub { display: flex; align-items: center; gap: 8px; padding: 5px 9px; border-radius: 6px; border: 1px solid #c8c2b6; background: rgba(255,255,255,.4); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .sub.ck { background: rgba(90,122,90,.1); border-color: #9ab89a; }
  .sub-box { width: 15px; height: 15px; border-radius: 3px; border: 1.5px solid var(--text-dim); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .sub.ck .sub-box { background: var(--check); border-color: var(--check); }
  .sub.ck .sub-box::after { content: ''; width: 4px; height: 7px; border: 1.5px solid #f4f0e8; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }
  .sub-txt { font-size: 13px; color: var(--text-muted); flex:1; }
  .sub.ck .sub-txt { color: var(--text); }
  .sub-macros { font-size: 10px; color: var(--text-dim); }

  .fix { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; margin-bottom: 4px; border-radius: var(--rs); border: 1px dashed var(--border); background: transparent; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .fix.ck { border-color: #9ab89a; background: rgba(90,122,90,.08); }
  .fix-box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--text-dim); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .fix.ck .fix-box { background: #9ab89a; border-color: #7a9a7a; }
  .fix.ck .fix-box::after { content: ''; width: 5px; height: 9px; border: 2px solid #f4f0e8; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }
  .fix-txt { font-size: 13px; color: var(--text-dim); flex: 1; line-height: 1.4; }
  .fix.ck .fix-txt { color: var(--text-muted); }
  .fix-macros { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .vrd-block { margin-bottom: 12px; }
  .vrd-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--rs); border: 1px solid var(--border); background: var(--surface); cursor: pointer; margin-bottom: 5px; -webkit-tap-highlight-color: transparent; }
  .vrd-row.ck { background: rgba(90,122,90,.14); border-color: #9ab89a; }
  .vrd-box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--text-dim); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .vrd-row.ck .vrd-box { background: var(--check); border-color: var(--check); }
  .vrd-row.ck .vrd-box::after { content: ''; width: 5px; height: 9px; border: 2px solid #f4f0e8; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }
  .vrd-lbl { font-size: 14px; color: var(--text-muted); flex: 1; }
  .vrd-row.ck .vrd-lbl { color: var(--text); }
  .vrd-input { width: 100%; padding: 7px 12px; border-radius: var(--rs); border: 1px dashed #9ab89a; background: rgba(90,122,90,.05); font-family: inherit; font-size: 13px; color: var(--text); outline: none; resize: none; }
  .vrd-input::placeholder { color: var(--text-dim); }

  .pw-badge { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: #8a4a1a; background: rgba(196,122,58,.12); padding: 2px 7px; border-radius: 10px; display: inline-block; margin-bottom: 4px; }

  .acqua { margin: 22px 16px 8px; padding: 15px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); }
  .acq-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .acq-title { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #2d5a8a; }
  .acq-tot { font-size: 13px; color: var(--text-muted); font-weight: 600; }
  .acq-tot b { color: #2d5a8a; font-size: 17px; }
  .acq-bar-wrap { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
  .acq-bar { height: 100%; background: #4a7ab5; border-radius: 6px; transition: width .3s; }
  .acq-ctrl { display: flex; align-items: center; gap: 10px; }
  .acq-inp-wrap { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; border: 1px solid var(--border); border-radius: var(--rs); background: var(--bg); padding: 7px 10px; }
  .acq-inp { border: none; background: transparent; font-family: inherit; font-size: 18px; font-weight: 700; color: var(--text); width: 70px; text-align: center; outline: none; }
  .acq-unit { font-size: 12px; color: var(--text-dim); }
  .acq-btn { width: 42px; height: 42px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: inherit; }
  .acq-btn.minus { background: var(--surface2); color: var(--text-muted); }
  .acq-btn.plus  { background: #4a7ab5; color: white; }
  .acq-note { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 9px; }
  .acq-ok { font-size: 12px; font-weight: 600; color: #3d5c3d; text-align: center; margin-top: 6px; display: none; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <span class="app-title">Dieta</span>
    <button class="reset-btn" onclick="resetDay()">Reset giorno</button>
  </div>
  <div class="day-sel">
    <button class="day-btn" id="btn-on"      onclick="setDay('on')">ON<br><span style="font-size:10px;font-weight:400">mar gio sab dom</span></button>
    <button class="day-btn" id="btn-off"     onclick="setDay('off')">OFF<br><span style="font-size:10px;font-weight:400">mer ven</span></button>
    <button class="day-btn" id="btn-scarico" onclick="setDay('scarico')">SCARICO<br><span style="font-size:10px;font-weight:400">lun</span></button>
  </div>
</div>

<div class="totali" id="totali"></div>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <span class="prog-lbl" id="progLbl">0 / 0</span>
</div>
<div class="content" id="content"></div>

<div class="acqua">
  <div class="acq-hdr">
    <span class="acq-title">Acqua</span>
    <span class="acq-tot"><b id="acqMl">0</b> / 3250 ml</span>
  </div>
  <div class="acq-bar-wrap"><div class="acq-bar" id="acqBar" style="width:0%"></div></div>
  <div class="acq-ctrl">
    <button class="acq-btn minus" onclick="acqChange(-1)">-</button>
    <div class="acq-inp-wrap">
      <input class="acq-inp" id="acqQty" type="number" value="300" min="50" max="1000" step="50">
      <span class="acq-unit">ml</span>
    </div>
    <button class="acq-btn plus" onclick="acqChange(1)">+</button>
  </div>
  <div class="acq-note" id="acqNote">Obiettivo: 3250 ml</div>
  <div class="acq-ok"  id="acqOk"></div>
</div>

var curDay='on', ST={};
function gs(d,id){ if(!ST[d])ST[d]={}; if(!ST[d][id])ST[d][id]={ai:0,ck:{},tx:{}}; return ST[d][id]; }
function setDay(d){ curDay=d; render(); }
function resetDay(){ if(confirm('Reset giorno '+curDay.toUpperCase()+'?')){ ST[curDay]={}; render(); } }
function radioSel(d,id,ci,oi){ var s=gs(d,id); Object.keys(s.ck).forEach(function(k){ if(k.indexOf('c'+ci+'_')===0)s.ck[k]=false; }); s.ck['c'+ci+'_'+oi]=true; render(); }
function toggleFix(d,id,k){ var s=gs(d,id); s.ck[k]=!s.ck[k]; render(); }
function toggleSub(d,id,ci,oi,si,e){ e.stopPropagation(); var s=gs(d,id); s.ck['s'+ci+'_'+oi+'_'+si]=!s.ck['s'+ci+'_'+oi+'_'+si]; render(); }
function setAlt(d,id,ai){ var s=gs(d,id); if(s.ai!==ai){s.ai=ai;s.ck={};s.tx={};} render(); }
function toggleVrd(d,id){ var s=gs(d,id); s.ck['vrd']=!s.ck['vrd']; render(); }
function saveVrd(d,id,v){ gs(d,id).tx['vrd']=v; }
function togglePW(d,id){ var s=gs(d,id); s.ck['pw']=!s.ck['pw']; render(); }

function fmtM(m){ if(!m) return ''; return m[0]+' kcal · C '+m[1]+' · P '+m[2]+' · G '+m[3]; }
function addM(a,b){ return [a[0]+b[0], Math.round((a[1]+b[1])*10)/10, Math.round((a[2]+b[2])*10)/10, Math.round((a[3]+b[3])*10)/10]; }

function mealMacros(p,s){
  var tot=[0,0,0,0];
  var cats=p.alt?p.alt[s.ai].cats:p.cats;
  cats.forEach(function(cat,ci){
    if(cat.tipo==='radio'){
      cat.opts.forEach(function(opt,oi){
        if(s.ck['c'+ci+'_'+oi]){
          if(opt.sub){
            // somma solo i sub selezionati
            opt.sub.forEach(function(sb,si){ if(s.ck['s'+ci+'_'+oi+'_'+si] && sb.m) tot=addM(tot,sb.m); });
          } else if(opt.m){ tot=addM(tot,opt.m); }
        }
      });
    } else {
      cat.opts.forEach(function(opt,oi){ if(s.ck['c'+ci+'_'+oi] && opt.m) tot=addM(tot,opt.m); });
    }
  });
  if(p.pw && s.ck['pw'] && p.pwm) tot=addM(tot,p.pwm);
  return tot;
}

function countCk(){
  var day=D[curDay], total=0, done=0;
  day.pasti.forEach(function(p){
    var s=gs(curDay,p.id);
    if(p.verdure){ total++; if(s.ck['vrd'])done++; }
    var cats=p.alt?p.alt[s.ai].cats:p.cats;
    cats.forEach(function(cat,ci){
      if(cat.tipo==='radio'){ total++; if(cat.opts.some(function(_,oi){return s.ck['c'+ci+'_'+oi];}))done++; }
      else { cat.opts.forEach(function(_,oi){ total++; if(s.ck['c'+ci+'_'+oi])done++; }); }
    });
    if(p.pw){ total++; if(s.ck['pw'])done++; }
  });
  return {total:total,done:done};
}

function render(){
  ['on','off','scarico'].forEach(function(d){
    var b=document.getElementById('btn-'+d); var cls='day-btn';
    if(d===curDay) cls+=' '+(d==='scarico'?'sc':d); b.className=cls;
  });
  var day=D[curDay];

  // totale giornaliero
  var gtot=[0,0,0,0];
  day.pasti.forEach(function(p){ gtot=addM(gtot,mealMacros(p,gs(curDay,p.id))); });
  var T=day.target;
  var labels=['Calorie','Carb','Prot','Grassi'];
  var units=['','g','g','g'];
  var html='<div class="totali-row">';
  for(var i=0;i<4;i++){
    var over = gtot[i] > T[i]*1.05 ? ' over':'';
    html+='<div class="tot-card"><div class="tot-val'+over+'">'+gtot[i]+units[i]+'</div><div class="tot-lbl">'+labels[i]+'</div><div class="tot-target">/ '+T[i]+units[i]+'</div></div>';
  }
  html+='</div>';
  document.getElementById('totali').innerHTML=html;

  var r=countCk();
  document.getElementById('progFill').style.width=(r.total?Math.round(r.done/r.total*100):0)+'%';
  document.getElementById('progLbl').textContent=r.done+' / '+r.total;

  var c='';
  day.pasti.forEach(function(p,pi){
    var s=gs(curDay,p.id);
    var mm=mealMacros(p,s);
    var hasM = mm[0]>0;
    c+='<div class="meal-sec">';
    c+='<div class="meal-head"><span class="meal-lbl '+p.type+'">'+p.nome+'</span>';
    if(hasM) c+='<span class="meal-sub"><b>'+mm[0]+'</b> kcal · C '+mm[1]+' · P '+mm[2]+' · G '+mm[3]+'</span>';
    c+='</div>';
    if(p.note) c+='<div class="sec-note">'+p.note+'</div>';

    if(p.verdure){
      var vc=s.ck['vrd']?' ck':''; var vt=s.tx['vrd']||'';
      c+='<div class="vrd-block"><div class="cat-lbl">Verdure</div>';
      c+='<div class="vrd-row'+vc+'" onclick="toggleVrd(\''+curDay+'\',\''+p.id+'\')"><div class="vrd-box"></div>';
      c+='<div class="vrd-lbl">Verdure di stagione a volonta <span style="font-size:11px;color:var(--text-dim)">(max 200g se pomodori, peperoni, zucca, carota, barbabietola)</span></div></div>';
      c+='<textarea class="vrd-input" rows="2" placeholder="Annotazione verdure..." oninput="saveVrd(\''+curDay+'\',\''+p.id+'\',this.value)">'+vt+'</textarea></div>';
    }

    if(p.alt){
      c+='<div class="alt-tabs">';
      p.alt.forEach(function(a,ai){ c+='<button class="alt-tab'+(s.ai===ai?' sel':'')+'" onclick="setAlt(\''+curDay+'\',\''+p.id+'\','+ai+')">'+a.nome+'</button>'; });
      c+='</div>';
      c+=renderCats(p.alt[s.ai].cats,p.id,s);
    } else { c+=renderCats(p.cats,p.id,s); }

    if(p.pw){
      var pwc=s.ck['pw']?' ck':'';
      c+='<div class="pw-badge">POST WORKOUT</div>';
      c+='<div class="fix'+pwc+'" onclick="togglePW(\''+curDay+'\',\''+p.id+'\')"><div class="fix-box"></div><div style="flex:1"><div class="fix-txt">'+p.pw+'</div>'+(p.pwm?'<div class="fix-macros">'+fmtM(p.pwm)+'</div>':'')+'</div></div>';
    }
    c+='</div>';
    if(pi<day.pasti.length-1) c+='<div class="divider"></div>';
  });
  document.getElementById('content').innerHTML=c;
}

function renderCats(cats,pid,s){
  var h='';
  cats.forEach(function(cat,ci){
    h+='<div class="cat-block">';
    if(cat.nome) h+='<div class="cat-lbl">'+cat.nome+'</div>';
    if(cat.tipo==='radio'){
      cat.opts.forEach(function(opt,oi){
        var ck=s.ck['c'+ci+'_'+oi];
        h+='<div class="opt'+(ck?' ck':'')+'" onclick="radioSel(\''+curDay+'\',\''+pid+'\','+ci+','+oi+')"><div class="opt-circle"></div><div class="opt-text"><div>'+opt.l+'</div>';
        if(opt.m && !opt.sub) h+='<div class="opt-macros">'+fmtM(opt.m)+'</div>';
        if(opt.sub && ck){
          h+='<div class="sub-list">';
          opt.sub.forEach(function(sb,si){
            var sc=s.ck['s'+ci+'_'+oi+'_'+si];
            h+='<div class="sub'+(sc?' ck':'')+'" onclick="toggleSub(\''+curDay+'\',\''+pid+'\','+ci+','+oi+','+si+',event)"><div class="sub-box"></div><div class="sub-txt">'+sb.l+'</div>'+(sb.m?'<div class="sub-macros">'+sb.m[0]+' kcal · P '+sb.m[2]+'</div>':'')+'</div>';
          });
          h+='</div>';
        }
        h+='</div></div>';
      });
    } else {
      cat.opts.forEach(function(opt,oi){
        var ck=s.ck['c'+ci+'_'+oi];
        h+='<div class="fix'+(ck?' ck':'')+'" onclick="toggleFix(\''+curDay+'\',\''+pid+'\',\'c'+ci+'_'+oi+'\')"><div class="fix-box"></div><div style="flex:1"><div class="fix-txt">'+opt.l+'</div>'+(opt.m?'<div class="fix-macros">'+fmtM(opt.m)+'</div>':'')+'</div></div>';
      });
    }
    h+='</div>';
  });
  return h;
}

var acqTot=0, ACQ_TARGET=3250;
function acqChange(sg){ var q=parseInt(document.getElementById('acqQty').value)||300; acqTot=Math.max(0,acqTot+sg*q); renderAcq(); }
function renderAcq(){
  var pct=Math.min(100,Math.round(acqTot/ACQ_TARGET*100));
  document.getElementById('acqMl').textContent=acqTot;
  document.getElementById('acqBar').style.width=pct+'%';
  var n=document.getElementById('acqNote'), ok=document.getElementById('acqOk');
  if(acqTot>=ACQ_TARGET){ n.style.display='none'; ok.style.display='block'; ok.textContent='Obiettivo raggiunto! ('+acqTot+' ml)'; }
  else { n.style.display='block'; n.textContent='Mancano '+(ACQ_TARGET-acqTot)+' ml all\'obiettivo'; ok.style.display='none'; }
}

var jsMap={0:'on',1:'scarico',2:'off',3:'on',4:'off',5:'on',6:'on'};
curDay=jsMap[new Date().getDay()];
render(); renderAcq();
</script>
